<svg viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b" />
    </marker>
  </defs>

  <rect width="1180" height="760" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="46" font-size="24" font-weight="700" fill="#1a1a1a">Arquitectura del sistema — Botillería "La Spirit"</text>
  <text x="40" y="70" font-size="13" fill="#6b7280">Flujo de datos: Cliente Web → Frontend (Vercel) → Backend (Render) → MongoDB Atlas · Control de versiones y CI/CD vía GitHub</text>

  <!-- Cliente Web -->
  <g>
    <rect x="60" y="140" width="220" height="110" rx="14" fill="#fff" stroke="#c0392b" stroke-width="2" />
    <text x="170" y="180" font-size="16" font-weight="700" text-anchor="middle" fill="#1a1a1a">Cliente Web</text>
    <text x="170" y="202" font-size="12" text-anchor="middle" fill="#4b5563">Navegador del usuario</text>
    <text x="170" y="220" font-size="12" text-anchor="middle" fill="#4b5563">(cajero / administrador)</text>
  </g>

  <!-- Frontend -->
  <g>
    <rect x="360" y="140" width="240" height="130" rx="14" fill="#fff" stroke="#c0392b" stroke-width="2" />
    <text x="480" y="172" font-size="16" font-weight="700" text-anchor="middle" fill="#1a1a1a">Frontend</text>
    <text x="480" y="194" font-size="12" text-anchor="middle" fill="#4b5563">React + Vite</text>
    <text x="480" y="212" font-size="12" text-anchor="middle" fill="#4b5563">Desplegado en</text>
    <rect x="410" y="222" width="140" height="26" rx="6" fill="#000" />
    <text x="480" y="240" font-size="12.5" font-weight="700" text-anchor="middle" fill="#fff">▲ Vercel</text>
  </g>

  <!-- Backend -->
  <g>
    <rect x="680" y="140" width="240" height="130" rx="14" fill="#fff" stroke="#c0392b" stroke-width="2" />
    <text x="800" y="172" font-size="16" font-weight="700" text-anchor="middle" fill="#1a1a1a">Backend / API REST</text>
    <text x="800" y="194" font-size="12" text-anchor="middle" fill="#4b5563">Node.js + Express</text>
    <text x="800" y="212" font-size="12" text-anchor="middle" fill="#4b5563">Desplegado en</text>
    <rect x="730" y="222" width="140" height="26" rx="6" fill="#46e3b7" />
    <text x="800" y="240" font-size="12.5" font-weight="700" text-anchor="middle" fill="#0a1f16">Render</text>
  </g>

  <!-- MongoDB Atlas -->
  <g>
    <rect x="980" y="140" width="160" height="130" rx="14" fill="#fff" stroke="#13aa52" stroke-width="2" />
    <text x="1060" y="172" font-size="15" font-weight="700" text-anchor="middle" fill="#1a1a1a">MongoDB</text>
    <text x="1060" y="192" font-size="15" font-weight="700" text-anchor="middle" fill="#1a1a1a">Atlas</text>
    <text x="1060" y="216" font-size="11.5" text-anchor="middle" fill="#4b5563">Cluster M0</text>
    <text x="1060" y="232" font-size="11.5" text-anchor="middle" fill="#4b5563">(NoSQL, cloud)</text>
  </g>

  <!-- Arrows: Cliente -> Frontend -> Backend -> Atlas -->
  <line x1="280" y1="195" x2="358" y2="195" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" />
  <text x="319" y="188" font-size="10.5" text-anchor="middle" fill="#6b7280">HTTPS</text>

  <line x1="600" y1="195" x2="678" y2="195" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" />
  <text x="639" y="188" font-size="10.5" text-anchor="middle" fill="#6b7280">fetch / Axios</text>
  <text x="639" y="212" font-size="9.5" text-anchor="middle" fill="#9ca3af">VITE_API_URL</text>

  <line x1="920" y1="205" x2="978" y2="205" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" />
  <text x="949" y="198" font-size="10.5" text-anchor="middle" fill="#6b7280">Mongoose</text>
  <text x="949" y="222" font-size="9.5" text-anchor="middle" fill="#9ca3af">MONGODB_URI</text>

  <!-- GitHub row -->
  <g>
    <rect x="360" y="380" width="240" height="150" rx="14" fill="#f8f9fa" stroke="#1a1a1a" stroke-width="2" />
    <text x="480" y="415" font-size="16" font-weight="700" text-anchor="middle" fill="#1a1a1a">GitHub</text>
    <text x="480" y="437" font-size="12" text-anchor="middle" fill="#4b5563">Repositorio único</text>
    <text x="480" y="454" font-size="12" text-anchor="middle" fill="#4b5563">(frontend/ + backend/)</text>
    <text x="480" y="476" font-size="11.5" text-anchor="middle" fill="#4b5563">Estrategia de ramas: main</text>
    <text x="480" y="493" font-size="11.5" text-anchor="middle" fill="#4b5563">+ ramas de feature por HU</text>
    <text x="480" y="514" font-size="11" text-anchor="middle" fill="#c0392b" font-weight="600">GitHub Actions (CI/CD)</text>
  </g>

  <!-- Jira -->
  <g>
    <rect x="60" y="400" width="220" height="110" rx="14" fill="#f8f9fa" stroke="#1a1a1a" stroke-width="2" />
    <text x="170" y="438" font-size="16" font-weight="700" text-anchor="middle" fill="#1a1a1a">Jira</text>
    <text x="170" y="460" font-size="12" text-anchor="middle" fill="#4b5563">Gestión ágil (Scrum)</text>
    <text x="170" y="478" font-size="12" text-anchor="middle" fill="#4b5563">Backlog · Sprints · HU</text>
  </g>

  <!-- GitHub -> Frontend/Backend (deploy arrows) with dashed red lines -->
  <path d="M480,380 C480,330 480,300 480,270" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)" />
  <text x="500" y="330" font-size="10.5" fill="#c0392b">deploy</text>

  <path d="M560,410 C660,410 700,340 720,270" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)" />
  <text x="640" y="360" font-size="10.5" fill="#c0392b">deploy</text>

  <!-- Jira -> GitHub relation -->
  <line x1="280" y1="455" x2="358" y2="455" stroke="#6b7280" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)" />
  <text x="319" y="448" font-size="10" text-anchor="middle" fill="#6b7280">seguimiento</text>

  <!-- Legend -->
  <g>
    <rect x="60" y="600" width="1080" height="130" rx="12" fill="#f8f9fa" stroke="#e5e7eb" />
    <text x="84" y="628" font-size="13" font-weight="700" fill="#1a1a1a">Leyenda</text>
    <line x1="84" y1="648" x2="120" y2="648" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" />
    <text x="130" y="652" font-size="12" fill="#4b5563">Flujo de datos en producción (petición del usuario final)</text>

    <line x1="84" y1="672" x2="120" y2="672" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)" />
    <text x="130" y="676" font-size="12" fill="#4b5563">Despliegue automático (CI/CD) activado por push a GitHub</text>

    <text x="84" y="700" font-size="12" fill="#4b5563">Frontend (Vercel): variable VITE_API_URL apunta a la URL pública del backend en Render.</text>
    <text x="84" y="718" font-size="12" fill="#4b5563">Backend (Render): variables MONGODB_URI (conexión a Atlas) y FRONTEND_URL (restricción de CORS).</text>
  </g>
</svg>
